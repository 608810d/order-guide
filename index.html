<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cigarette Order Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border-strong:#c8c5ba;
    --text:#1a1916;--text-muted:#7a7870;--accent:#c8440a;--accent-bg:#fdf1ec;--accent-border:#f0c4b0;
    --success:#2a7a4b;--success-bg:#edf7f1;--success-border:#b0dcc0;
    --wa:#25d366;--wa-dark:#1aad52;--radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
  header{background:var(--text);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .header-title{font-size:16px;font-weight:600;}
  .header-sub{font-size:12px;color:#9a9890;margin-top:2px;}
  .stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
  .stat{flex:1;padding:14px 20px;border-right:1px solid var(--border);text-align:center;}
  .stat:last-child{border-right:none;}
  .stat-val{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;}
  .stat-val.red{color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .toolbar{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10;}
  .search-wrap{flex:1;min-width:200px;position:relative;}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
  input[type="search"],input[type="number"]{font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);padding:7px 10px;outline:none;transition:border-color .15s;}
  input[type="search"]{padding-left:32px;width:100%;}
  input:focus{border-color:var(--text);}
  .btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;transition:background .12s;}
  .btn:hover{background:var(--bg);}
  .btn.active{background:var(--success-bg);border-color:var(--success-border);color:var(--success);}
  .btn.wa{background:var(--wa);border-color:var(--wa);color:#fff;font-weight:600;display:flex;align-items:center;gap:7px;}
  .btn.wa:hover{background:var(--wa-dark);border-color:var(--wa-dark);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:620px;}
  thead th{background:#f0ede6;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover td{background:#fafaf7;}
  tbody tr.ok-row td{opacity:.38;}
  td{padding:9px 12px;vertical-align:middle;background:var(--surface);}
  .item-name{font-weight:500;font-size:13px;}
  .item-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:1px;}
  td input[type="number"]{width:72px;text-align:center;padding:5px 6px;font-family:'DM Mono',monospace;font-size:13px;background:var(--surface);}
  .combined-val{font-family:'DM Mono',monospace;font-size:13px;text-align:center;font-weight:500;}
  .order-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;text-align:center;}
  .order-val.need{color:var(--accent);}
  .order-val.ok{color:var(--success);}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;}
  .badge.need{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
  .badge.ok{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);}
  .divider-row td{background:#f0ede6 !important;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:6px 12px;}
  .empty-row td{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;background:var(--surface) !important;}
  mark{background:#ffe066;color:inherit;border-radius:2px;padding:0 1px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,8,.55);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal-header{background:var(--text);color:#fff;padding:16px 20px;font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1;}
  .modal-close:hover{color:#fff;}
  .modal-body{padding:20px;}
  .order-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;max-height:240px;overflow-y:auto;margin-bottom:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;}
  .preview-item{display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-bottom:1px solid var(--border);}
  .preview-item:last-child{border-bottom:none;}
  .preview-qty{color:var(--accent);font-weight:600;white-space:nowrap;}
  .wa-note{background:#f0fdf4;border:1px solid #b0dcc0;border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:#2a7a4b;margin-bottom:16px;line-height:1.6;}
  .no-order-msg{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius-sm);padding:20px;color:var(--success);font-weight:500;text-align:center;font-size:14px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
  @media(max-width:600px){.stats-bar{flex-wrap:wrap;}.stat{min-width:50%;border-right:none;border-bottom:1px solid var(--border);}header{padding:14px 16px;}}
</style>
</head>

<header>
  <div>

</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="stat-showing">136</div><div class="stat-label">Showing</div></div>
  <div class="stat"><div class="stat-val red" id="stat-need">0</div><div class="stat-label">Need to order</div></div>
  <div class="stat"><div class="stat-val" id="stat-ok">0</div><div class="stat-label">At par / OK</div></div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Search by name, item #, or UPC..." oninput="render()" />
  </div>
  <button class="btn" id="toggle-btn" onclick="toggleOk()">Hide items at par</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:30%">Item</th>
        <th style="width:11%;text-align:center">On Display</th>
        <th style="width:13%;text-align:center">Under Cabinets</th>
        <th style="width:12%;text-align:center">Must Have</th>
        <th style="width:10%;text-align:center">Combined</th>
        <th style="width:10%;text-align:center">Order Qty</th>
        <th style="width:10%;text-align:center">Status</th>
      </tr>
    </thead>
    <tbody id="items-body"></tbody>
  </table>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span>Send Order via WhatsApp</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

let state=RAW.map((r,i)=>({...r,id:i,loc1:0,loc2:0}));
let hideOk=false;

function calc(item){
  const combined=(parseFloat(item.loc1)||0)+(parseFloat(item.loc2)||0);
  const need=parseFloat(item.must_have)||0;
  const order=Math.max(0,+(need-combined).toFixed(2));
  return{combined:+combined.toFixed(2),order};
}

function hl(text,q){
  if(!q)return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function toggleOk(){
  hideOk=!hideOk;
  const btn=document.getElementById('toggle-btn');
  btn.textContent=hideOk?'Show all items':'Hide items at par';
  btn.classList.toggle('active',hideOk);
  render();
}

function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const tbody=document.getElementById('items-body');
  tbody.innerHTML='';
  let filtered=state.filter(i=>!q||i.item_name.toLowerCase().includes(q)||i.item_number.toLowerCase().includes(q)||(i.upc&&i.upc.toLowerCase().includes(q)));
  const needItems=filtered.filter(i=>calc(i).order>0);
  const okItems=filtered.filter(i=>calc(i).order===0);

  function addRow(item){
    const{combined,order}=calc(item);
    const tr=document.createElement('tr');
    if(order===0)tr.classList.add('ok-row');
    tr.innerHTML=`
      <td><div class="item-name">${hl(item.item_name,q)}</div><div class="item-meta">#${hl(item.item_number||'—',q)}${item.upc?' &nbsp;|&nbsp; UPC: '+hl(item.upc,q):''}</div></td>
      <td style="text-align:center"><input type="number" min="0" step="0.5" value="${item.loc1}" onchange="upd(${item.id},'loc1',this.value)"/></td>
      <td style="text-align:center"><input type="number" min="0" step="0.5" value="${item.loc2}" onchange="upd(${item.id},'loc2',this.value)"/></td>
      <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:500">${item.must_have}</td>
      <td><div class="combined-val">${combined}</div></td>
      <td><div class="order-val ${order>0?'need':'ok'}">${order>0?order:'—'}</div></td>
      <td style="text-align:center"><span class="badge ${order>0?'need':'ok'}">${order>0?'Order':'OK'}</span></td>`;
    tbody.appendChild(tr);
  }

  needItems.forEach(addRow);
  if(!hideOk){
    if(needItems.length>0&&okItems.length>0){
      const div=document.createElement('tr');
      div.classList.add('divider-row');
      div.innerHTML='<td colspan="7">Items at par — no order needed</td>';
      tbody.appendChild(div);
    }
    okItems.forEach(addRow);
  }
  if(filtered.length===0){const tr=document.createElement('tr');tr.classList.add('empty-row');tr.innerHTML=`<td colspan="7">No items match "${q}"</td>`;tbody.appendChild(tr);}
  if(hideOk&&needItems.length===0&&okItems.length>0){const tr=document.createElement('tr');tr.classList.add('empty-row');tr.innerHTML='<td colspan="7">All items are at par — nothing to order!</td>';tbody.appendChild(tr);}
  document.getElementById('stat-showing').textContent=filtered.length;
  document.getElementById('stat-need').textContent=needItems.length;
  document.getElementById('stat-ok').textContent=okItems.length;
}

function upd(id,field,value){
  const item=state.find(i=>i.id===id);
  if(item){item[field]=parseFloat(value)||0;render();}
}

function openModal(){
  const orderItems=state.filter(i=>calc(i).order>0);
  const mb=document.getElementById('modal-body');
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  if(orderItems.length===0){
    mb.innerHTML='<div class="no-order-msg">Everything is fully stocked — nothing to order today!</div><div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>';
  } else {
    let preview=orderItems.map(i=>{const{order}=calc(i);return`<div class="preview-item"><span>${i.item_name}${i.item_number?' (#'+i.item_number+')':''}</span><span class="preview-qty">x${order}</span></div>`;}).join('');
    let msg=`🚬 CIGARETTE ORDER REQUEST\n📅 ${today}\n${'─'.repeat(32)}\n`;
    orderItems.forEach(i=>{const{order}=calc(i);msg+=`• ${i.item_name}${i.item_number?' (#'+i.item_number+')':''} → ORDER: ${order}\n`;});
    msg+=`${'─'.repeat(32)}\nTotal items to order: ${orderItems.length}`;
    const waURL=`https://wa.me/${OWNER_PHONE}?text=${encodeURIComponent(msg)}`;
    mb.innerHTML=`
      <div class="wa-note">✅ WhatsApp will open with the order already typed — just tap <strong>Send</strong>!</div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px">Items to order (${orderItems.length})</div>
      <div class="order-preview">${preview}</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <a href="${waURL}" target="_blank" style="text-decoration:none" onclick="setTimeout(closeModal,300)">
          <button class="btn wa">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Open WhatsApp &amp; Send
          </button>
        </a>
      </div>`;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
render();
</script>
